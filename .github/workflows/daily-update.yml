name: Daily CFP update and Pages deploy

on:
  schedule:
    # 00:07 UTC = 09:07 Korea Standard Time
    - cron: "7 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Prevent two CFP updater runs from writing to main at the same time.
concurrency:
  group: cfp-update-main
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Diagnose outbound network and DNS
        shell: bash
        run: |
          set +e
          echo "## DNS checks"
          for host in github.com pypi.org cccg.ca www.cccg.ca wikicfp.com www.wikicfp.com; do
            echo "--- $host"
            getent ahosts "$host" | head -n 3 || echo "DNS lookup failed"
          done
          echo "## HTTP checks"
          for url in https://github.com https://pypi.org https://cccg.ca http://wikicfp.com/cfp/; do
            echo "--- $url"
            curl --ipv4 --location --head --silent --show-error \
              --connect-timeout 8 --max-time 15 "$url" | head -n 8 || true
          done

      - name: Install updater dependencies
        run: pip install -r requirements.txt

      - name: Run parser tests
        run: python tests/test_parser.py

      - name: Check WikiCFP and official sites
        run: python scripts/update_conferences.py | tee update-output.json

      - name: Add report to workflow summary
        if: always()
        run: |
          echo '## Daily CFP update' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .update-report.json >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Rebuild portable HTML
        run: python scripts/build_single_html.py

      - name: Commit and push verified changes
        shell: bash
        run: |
          set -euo pipefail

          rm -f .update-report.json update-output.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data.json data.js cg-conference-timeline.html

          if git diff --cached --quiet; then
            echo "No conference-data changes."
          else
            git commit -m "chore: update conference dates"

            # main may have changed while the crawler was running. Rebase the
            # generated commit onto the newest remote main and retry safely.
            for attempt in 1 2 3; do
              echo "Push attempt ${attempt}/3"
              git fetch origin main

              if ! git rebase origin/main; then
                git rebase --abort || true
                echo "Rebase conflict. A remote commit changed the same generated files."
                echo "Resolve the conflict manually, then run this workflow again."
                exit 1
              fi

              if git push origin HEAD:main; then
                echo "Conference updates pushed successfully."
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "Push was rejected three times because main kept changing."
                exit 1
              fi

              sleep $((attempt * 5))
            done
          fi

      - name: Build Pages directory from latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          python scripts/build_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
